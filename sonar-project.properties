# SonarQube / SonarCloud project configuration for WordLearn
#
# Çalıştırma:
#   1) ./gradlew clean :app:jacocoTestReport
#   2) sonar-scanner  (veya SonarCloud GitHub Action / Jenkins / CI)
#
# `sonar.token` veya `sonar.host.url` gibi gizli değerler komut satırından
# (-Dsonar.token=xxx) ya da CI secret olarak verilmeli — bu dosyaya
# kesinlikle yazılmamalı.

# --- Proje tanımı ---
sonar.projectKey=canakbass_LearnEnglishApp
sonar.projectName=WordLearn (LearnEnglishApp)
sonar.projectVersion=1.0

# --- Kaynak / test konumları ---
sonar.sources=app/src/main/java
sonar.tests=app/src/test/java
sonar.sourceEncoding=UTF-8

# --- Dil ---
sonar.kotlin.source.version=1.9
sonar.java.source=17

# --- Bytecode (compiled class files — Kotlin için zorunlu) ---
sonar.java.binaries=app/build/tmp/kotlin-classes/debug,app/build/intermediates/javac/debug/classes
sonar.java.test.binaries=app/build/tmp/kotlin-classes/debugUnitTest

# --- Coverage raporu (JaCoCo XML) ---
# `./gradlew :app:jacocoTestReport` ile üretilir.
sonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

# --- Coverage / scope dışı (generated kod) ---
sonar.coverage.exclusions=\
    **/R.kt,\
    **/BuildConfig.*,\
    **/*ComposableSingletons*,\
    **/di/**,\
    **/theme/**,\
    **/MainActivity.kt,\
    **/WordLearnApplication.kt
